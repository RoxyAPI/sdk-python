pre-commit:
  parallel: true
  commands:
    ruff-format:
      glob: "*.py"
      run: uv run ruff format {staged_files}
      stage_fixed: true
    ruff-check:
      glob: "*.py"
      run: uv run ruff check --fix {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    ruff-check-strict:
      run: uv run ruff check .
    type-check:
      run: uv run mypy src/roxy_sdk/__init__.py
    pytest:
      run: uv run pytest tests/test_factory.py -q
